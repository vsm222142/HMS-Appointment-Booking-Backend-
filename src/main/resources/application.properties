spring.application.name=hms-backend

server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=CHANGE_ME_TO_A_LONG_RANDOM_SECRET_CHANGE_ME
app.jwt.issuer=hms-backend
app.jwt.expiration-minutes=120

app.cors.allowed-origins=http://localhost:5173,https://hms-appointment-booking.vercel.app

spring.jpa.open-in-view=false
spring.main.allow-bean-definition-overriding=true